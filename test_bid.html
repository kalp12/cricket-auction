 <!DOCTYPE html>
  <html>
  <head>
    <title>Auction WebSocket Test</title>
  </head>
  <body>
    <h1>Auction WebSocket Test</h1>
    <div id="messages"></div>
    <script>
      const ws = new WebSocket(`ws://localhost:8000/api/ws/auction/1`);
      ws.onmessage = function(event) {
        const msgDiv = document.createElement('div');
        msgDiv.textContent = `Received: ${event.data}`;
        document.getElementById('messages').appendChild(msgDiv);
      };
      ws.onopen = function() {
        document.getElementById('messages').innerHTML = 'Connected to auction WebSocket';
      };
      ws.onclose = function() {
        document.getElementById('messages').innerHTML += ' &lt;Connection closed&gt;';
      };
    </script>
  </body>
  </html>
